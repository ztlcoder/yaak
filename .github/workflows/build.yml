name: 'Publish Tauri App with npm'

on:
  push:
    branches:
      - main 

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        # ⭐️ 关键修改：同时定义 platform 和 target
        include:
          - platform: macos-latest
            target: universal-apple-darwin
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4 
      
      - name: Setup Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 
          
      - name: Install dependencies (npm) 
        run: npm install
        
      - name: Install Rust toolchain 
        uses: dtolnay/rust-toolchain@stable
        # 针对 macOS 构建通用二进制文件
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
        
      # 5. [仅限 Linux] 安装 Webkit2Gtk 依赖 
      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.0-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          
      - name: Build Tauri App # 6. 运行 Tauri 构建命令
        uses: tauri-apps/tauri-action@v0 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        with:
          # ⭐️ 使用 matrix.target 传入正确的值
          args: '--target ${{ matrix.target }}'
          
      - name: Upload Artifacts 
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.target }}-build
          path: src-tauri/target/release/bundle/
