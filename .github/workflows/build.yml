name: 'Build and Publish Yaak for Windows'

on:
  push:
    branches:
      - main # 在代码推送到 main 分支时触发构建

jobs:
  publish-windows:
    # 只需要 Windows 平台
    runs-on: windows-latest 
    
    # 明确定义目标平台参数，便于后续引用
    env:
      TAURI_TARGET: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4 # 1. 检出代码
      
      - name: Setup Node.js # 2. 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 使用 npm 缓存
          
      - name: Install dependencies (npm) # 3. 使用 npm 安装前端依赖
        run: npm install
        
      - name: Install Rust toolchain # 4. 设置 Rust 环境和目标架构
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ env.TAURI_TARGET }} # 使用环境变量中定义的 target
          
      - name: Build Tauri App for Windows # 5. 运行 Tauri 构建命令
        uses: tauri-apps/tauri-action@v0 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 自动提供的 secret
        with:
          # 传入正确的 Windows target 参数
          args: '--target ${{ env.TAURI_TARGET }}'
          
      - name: Upload Windows Artifacts # 6. 将生成的安装包作为工作流产物上传
        # 仅在构建步骤成功时执行此步骤
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          # Tauri 默认的 Windows 输出路径
          path: src-tauri/target/release/bundle/
