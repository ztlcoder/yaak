name: 'Build and Publish Yaak for Windows'

on:
  push:
    branches:
      - main # 在代码推送到 main 分支时触发构建

jobs:
  publish-windows:
    runs-on: windows-latest 
    
    # 定义目标平台参数
    env:
      TAURI_TARGET: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4 # 1. 检出代码
      
      - name: Setup Node.js # 2. 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 使用 npm 缓存
          
      - name: Install dependencies (npm) # 3. 使用 npm 安装前端依赖
        run: npm install
        
      - name: Install Rust toolchain # 4. 设置 Rust 环境和目标架构
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ env.TAURI_TARGET }}
          
      - name: Build and Release Tauri App for Windows # 5. 运行 Tauri 构建命令 (自动上传到 Release)
        uses: tauri-apps/tauri-action@v0 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 用于创建 Release
        with:
          # 传入正确的 Windows target 参数
          args: '--target ${{ env.TAURI_TARGET }}'
          # 注意：tauri-action 会自动创建 Release 并上传安装包
          
      # ⚠️ 移除了 actions/upload-artifact 步骤，避免重复上传和路径警告。
